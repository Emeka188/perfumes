<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <link rel="stylesheet" href="carousel.css">
</head>
<body>
    <div class="carousel-container" role="region" aria-label="Image carousel">
        <div class="carousel-wrapper" role="list">
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 1 of 10" aria-hidden="false"><img src="https://picsum.photos/800/400?text=1" alt="1"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 2 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=2" alt="2"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 3 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=3" alt="3"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 4 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=4" alt="4"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 5 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=5" alt="5"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 6 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=6" alt="6"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 7 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=7" alt="7"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 8 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=8" alt="8"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 9 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=9" alt="9"></div>
            <div class="slide" role="listitem" aria-roledescription="slide" aria-label="Slide 10 of 10" aria-hidden="true"><img src="https://picsum.photos/800/400?text=10" alt="10"></div>
        </div>

        <button class="btn prev" id="prevBtn" aria-label="Previous slide">&#10094;</button>
        <button class="btn next" id="nextBtn" aria-label="Next slide">&#10095;</button>

        <div class="dots" role="tablist" aria-label="Slide dots">
            <span class="dot active" data-index="0" role="button" aria-label="Go to slide 1" aria-current="true"></span>
            <span class="dot" data-index="1" role="button" aria-label="Go to slide 2"></span>
            <span class="dot" data-index="2" role="button" aria-label="Go to slide 3"></span>
            <span class="dot" data-index="3" role="button" aria-label="Go to slide 4"></span>
            <span class="dot" data-index="4" role="button" aria-label="Go to slide 5"></span>
            <span class="dot" data-index="5" role="button" aria-label="Go to slide 6"></span>
            <span class="dot" data-index="6" role="button" aria-label="Go to slide 7"></span>
            <span class="dot" data-index="7" role="button" aria-label="Go to slide 8"></span>
            <span class="dot" data-index="8" role="button" aria-label="Go to slide 9"></span>
            <span class="dot" data-index="9" role="button" aria-label="Go to slide 10"></span>
        </div>
    </div>
    <script src="carousel.js"></script>
</body>
</html>
