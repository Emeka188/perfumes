<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
</head>
<body>
    <div class="carousel">
    <div class="carousel-inner">
        <div class="slide active"><img src="https://picsum.photos/800/400?text=1" alt="1"></div>
        <div class="slide"><img src="https://picsum.photos/800/400?text=2" alt="2"></div>
        <div class="slide"><img src="https://picsum.photos/800/400?text=3" alt="3"></div>
        <div class="slide"><img src="https://picsum.photos/800/400?text=4" alt="4"></div>
        <div class="slide"><img src="https://picsum.photos/800/400?text=5" alt="5"></div>
    </div>

    <button class="prev" id="prevBtn">&#10094;</button>
    <button class="next" id="nextBtn">&#10095;</button>

    <div class="dots-container">
        <span class="dot active" data-index="0"></span>
        <span class="dot" data-index="1"></span>
        <span class="dot" data-index="2"></span>
    </div>
</div>
</body>
</html>
